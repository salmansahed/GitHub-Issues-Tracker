<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <!-- Site Icon -->
    <link rel="shortcut icon" href="./assets/site-logo.png">
    
    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">
    
    <!-- DaisyUI & Tailwind CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- Font-Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>
<body>
    <!-- Website Header Section -->
    <header>
        <!-- Website Navbar -->
        <nav class="flex flex-col gap-5 md:gap-0 md:flex-row justify-between items-center px-2 md:px-10 lg:px-20 py-[17px] bg-white shadow">
            <div>
                <h1 class="flex items-center gap-1"><img src="./assets/github-logo.png" alt="logo" class="w-9"><span class="text-2xl font-semibold">GitHub Issues Tracker</span></h1>
            </div>
            <div class="flex justify-end items-center gap-4">
                <div>
                    <label class="input">
                        <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                            <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none" stroke="currentColor">
                                <circle cx="11" cy="11" r="8"></circle>
                                <path d="m21 21-4.3-4.3"></path>
                            </g>
                        </svg>
                        <input type="search" required placeholder="Search issues..." />
                    </label>
                </div>
                <div>
                    <button class="btn btn-primary"><i class="fa-solid fa-plus"></i> New Issue</button>
                </div>
            </div>
        </nav>
    </header>

    <main class="max-w-11/12 md:max-w-11/12 lg:max-w-9/12 mx-auto mt-5 md:mt-8 lg:mt-[60px]">
        <section>
            <div class="bg-white shadow rounded-md p-2 md:p-4 lg:p-6 space-x-2 flex justify-between md:justify-start items-center">
                <button class="btn btn-primary w-[100px] md:w-[120px]">All</button>
                <button class="btn w-[100px] md:w-[120px]">Open</button>
                <button class="btn w-[100px] md:w-[120px]">Closed</button>
            </div>
        </section>
    </main>
</body>
</html>
