<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <!-- Site Icon -->
    <link rel="shortcut icon" href="./assets/site-logo.png">

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- DaisyUI & Tailwind CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    
</head>
<body class="flex items-center justify-center min-h-screen bg-gray-50 px-2">
    <!-- Login Page -->
    <section class="w-[520px] mx-auto bg-white shadow-lg rounded-lg p-8">
        <!-- Logo & text -->
        <div class="text-center mb-6">
            <img class="mx-auto" src="./assets/github-logo.png" alt="github-logo">
            <h2 class="text-2xl font-semibold">GitHub Issues Tracker</h2>
            <p class="text-[#64748B]">Sign in to manage your issues</p>
        </div>

        <!-- Input field -->
        <div>
            <label for="username-input" class="font-semibold">Username</label>
            <br>
            <input id="username-input" class="w-full rounded-md py-1 pl-2 border-2 border-[#E4E4E7]" maxlength="10" type="text" placeholder="Enter Username">
            <p class="mb-4 text-sm text-[#4A00FF]">Default: admin</p>

            <label for="password-input" class="font-semibold">Password</label>
            <br>
            <input id="password-input" class="w-full rounded-md py-1 pl-2 border-2 border-[#E4E4E7]" maxlength="15" type="password" placeholder="Enter Password">
            <p class="mb-6 text-sm text-[#4A00FF]">Default: admin123</p>
            <button id="sign-in-btn" class="btn btn-primary w-full rounded-md">Sign In</button>
        </div>

        <!-- Divider -->
        <div class="divider py-6">OR</div>

        <!-- Username & Password -->
        <p class="text-center mb-2 text-[#64748B] text-sm">Demo Credentials:</p>
        <div class="text-center bg-[#f8fafc] rounded-lg p-6">
            <p><span class="font-semibold">Username:</span> admin</p>
            <p><span class="font-semibold">Password:</span> admin123</p>
        </div>
    </section>

    <!-- JS Files -->
    <script src="login.js"></script>
</body>
</html>
